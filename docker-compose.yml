name: zonite

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: zonite
      POSTGRES_PASSWORD: zonite
      POSTGRES_DB: zonite
    ports:
      - '5432:5432'
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - zonite-net
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U zonite -d zonite']
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: dev
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql://zonite:zonite@postgres:5432/zonite
    ports:
      - '3000:3000'
    volumes:
      - .:/workspace
      - /workspace/node_modules
      - /workspace/apps/backend/node_modules
    networks:
      - zonite-net
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://127.0.0.1:3000/api/health']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: dev
    restart: unless-stopped
    env_file: .env
    ports:
      - '5173:5173'
    volumes:
      - .:/workspace
      - /workspace/node_modules
      - /workspace/apps/frontend/node_modules
    networks:
      - zonite-net

volumes:
  postgres-data:

networks:
  zonite-net:
    driver: bridge
